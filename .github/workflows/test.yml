name: Test
on:
  push:
    branches: [ master ]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - name: Run JVM tests
        run: sbt test
      - name: Compile JS tests
        run: sbt "mathutilJS/Test/compile; vectorJS/Test/compile; matrixJS/Test/compile; pga3dJS/Test/compile; pga2dJS/Test/compile; pga3dgeomJS/Test/compile; pga3dphysicsJS/Test/compile"
