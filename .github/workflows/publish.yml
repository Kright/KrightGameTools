name: Publish to Sonatype
on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'
          
      - name: Set up sbt
        uses: sbt/setup-sbt@v1
        
      - name: Import GPG Key
        run: |
          echo "${{ secrets.PGP_SECRET }}" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG

      - name: Probe snapshot endpoint auth
        if: "!startsWith(github.ref, 'refs/tags/')"
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: |
          if [ -z "$SONATYPE_USERNAME" ]; then echo "::error::SONATYPE_USERNAME secret is empty"; exit 1; fi
          if [ -z "$SONATYPE_PASSWORD" ]; then echo "::error::SONATYPE_PASSWORD secret is empty"; exit 1; fi
          code=$(curl -s -o /tmp/probe-resp.txt -w "%{http_code}" -X PUT --data "ci auth probe $(date -u +%s)" \
            -u "$SONATYPE_USERNAME:$SONATYPE_PASSWORD" \
            "https://central.sonatype.com/repository/maven-snapshots/me/kright/ci-auth-probe/0.0.1-SNAPSHOT/ci-auth-probe-0.0.1-SNAPSHOT.txt")
          echo "probe PUT status: $code"
          head -c 500 /tmp/probe-resp.txt || true
          case "$code" in
            2*) echo "auth OK" ;;
            *) echo "::error::snapshot endpoint rejected credentials (HTTP $code)"; exit 1 ;;
          esac

      - name: Publish
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: |
          sbt +publishSigned

      - name: Verify snapshot landed
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          url="https://central.sonatype.com/repository/maven-snapshots/me/kright/gametools-mathutil_3/0.9.1-SNAPSHOT/gametools-mathutil_3-0.9.1-SNAPSHOT.pom"
          code=$(curl -s -o /dev/null -D /tmp/headers.txt -w "%{http_code}" "$url")
          echo "pom status: $code for $url"
          grep -i "last-modified" /tmp/headers.txt || true
          if [ "$code" != "200" ]; then echo "::error::snapshot pom not found in maven-snapshots repo"; exit 1; fi

      - name: Release Bundle (only for tags)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: |
          sbt sonatypeBundleRelease

      - name: Create GitHub Release (only for tags)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists, skipping"
          else
            gh release create "$GITHUB_REF_NAME" --title "${GITHUB_REF_NAME#v}" --generate-notes --verify-tag
          fi
        working-directory: ${{ github.workspace }}